<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    <linearGradient id="gen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- Generator body -->
  <rect x="100" y="140" width="200" height="140" rx="12" fill="url(#gen)"/>
  <rect x="115" y="155" width="170" height="50" rx="6" fill="#92400e" opacity="0.3"/>
  <!-- Control panel -->
  <rect x="130" y="220" width="60" height="40" rx="4" fill="#1e293b"/>
  <circle cx="148" cy="235" r="6" fill="#22c55e"/>
  <circle cx="172" cy="235" r="6" fill="#ef4444"/>
  <rect x="130" y="248" width="60" height="6" rx="2" fill="#64748b"/>
  <!-- Exhaust -->
  <rect x="260" y="110" width="20" height="35" rx="4" fill="#78716c"/>
  <circle cx="270" cy="100" r="10" fill="#94a3b8" opacity="0.4"/>
  <circle cx="280" cy="88" r="8" fill="#94a3b8" opacity="0.3"/>
  <!-- Base -->
  <rect x="90" y="278" width="220" height="16" rx="4" fill="#b45309"/>
  <!-- Power plug -->
  <rect x="310" y="190" width="30" height="8" rx="2" fill="#1e293b"/>
  <rect x="340" y="185" width="8" height="18" rx="2" fill="#64748b"/>
  <!-- Floor shadow -->
  <ellipse cx="200" cy="310" rx="120" ry="8" fill="#000" opacity="0.15"/>
</svg>
