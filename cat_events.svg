<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="tent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#sky)" rx="20"/>
  <!-- Stars/lights -->
  <circle cx="60" cy="50" r="3" fill="#fde68a" opacity="0.8"/>
  <circle cx="150" cy="30" r="2" fill="#fde68a" opacity="0.6"/>
  <circle cx="300" cy="60" r="3" fill="#fde68a" opacity="0.7"/>
  <circle cx="350" cy="35" r="2" fill="#fde68a" opacity="0.5"/>
  <!-- String lights -->
  <path d="M40,90 Q120,115 200,90 Q280,65 360,90" stroke="#fde68a" stroke-width="2" fill="none"/>
  <circle cx="80" cy="101" r="5" fill="#fbbf24"/>
  <circle cx="140" cy="103" r="5" fill="#fb923c"/>
  <circle cx="200" cy="90" r="5" fill="#fbbf24"/>
  <circle cx="260" cy="78" r="5" fill="#fb923c"/>
  <circle cx="320" cy="88" r="5" fill="#fbbf24"/>
  <!-- Main tent -->
  <polygon points="200,120 60,300 340,300" fill="url(#tent)"/>
  <polygon points="200,120 130,300 270,300" fill="#fb7185" opacity="0.5"/>
  <!-- Tent stripes -->
  <line x1="200" y1="120" x2="95" y2="300" stroke="#fff" stroke-width="1.5" opacity="0.2"/>
  <line x1="200" y1="120" x2="165" y2="300" stroke="#fff" stroke-width="1.5" opacity="0.2"/>
  <line x1="200" y1="120" x2="235" y2="300" stroke="#fff" stroke-width="1.5" opacity="0.2"/>
  <line x1="200" y1="120" x2="305" y2="300" stroke="#fff" stroke-width="1.5" opacity="0.2"/>
  <!-- Tent opening -->
  <path d="M165,300 Q200,250 235,300" fill="#581c87"/>
  <!-- Tent top flag -->
  <line x1="200" y1="120" x2="200" y2="100" stroke="#78716c" stroke-width="3"/>
  <polygon points="200,100 220,108 200,116" fill="#fbbf24"/>
  <!-- Chairs -->
  <rect x="80" y="310" width="25" height="30" rx="3" fill="#d4d4d8"/>
  <rect x="80" y="305" width="25" height="8" rx="3" fill="#a1a1aa"/>
  <rect x="295" y="310" width="25" height="30" rx="3" fill="#d4d4d8"/>
  <rect x="295" y="305" width="25" height="8" rx="3" fill="#a1a1aa"/>
  <!-- Ground -->
  <rect x="0" y="340" width="400" height="60" rx="0" fill="#4c1d95" opacity="0.4"/>
</svg>
