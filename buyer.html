<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Dashboard — BastuBazar</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .dashboard-header {
            background: linear-gradient(135deg, var(--primary) 0%, #7C3AED 100%);
            color: var(--white);
            padding: 3rem 0;
            margin-bottom: 3rem;
        }
        .dashboard-title {
            font-size: 2rem;
            font-weight: 800;
        }
        .dashboard-subtitle {
            color: var(--gray-400);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <!-- ========== NAVBAR ========== -->
    <nav class="navbar navbar-expand-lg sticky-top bg-white border-bottom" id="main-navbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="brand-icon"><i class="bi bi-arrow-left-right"></i></span>
                BastuBazar
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-light btn-sm rounded-circle shadow-sm me-2" id="theme-toggle" style="width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; border: 1px solid #e5e7eb;">
                        <i class="bi bi-moon-fill"></i>
                    </button>
                    <button class="btn btn-outline-primary btn-sm rounded-pill px-3" id="btn-login" style="display:none;"></button>
                </div>
            </div>
        </div>
    </nav>

    <!-- ========== HEADER ========== -->
    <div class="dashboard-header">
        <div class="container">
            <h1 class="dashboard-title">Welcome back, <span id="buyer-name">Buyer</span>!</h1>
            <p class="dashboard-subtitle">Here is an overview of your activity and saved items.</p>
        </div>
    </div>

    <!-- ========== DASHBOARD CONTENT ========== -->
    <div class="container mb-5 pb-5">
        
        <h3 class="fw-bold mb-4"><i class="bi bi-heart-fill text-danger me-2"></i> Your Wishlist</h3>
        
        <div class="row g-4 mb-5" id="wishlist-grid">
            <!-- Rendered by JS -->
        </div>

        <h3 class="fw-bold mb-4"><i class="bi bi-clock-history text-primary me-2"></i> Recent Requests</h3>
        
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="px-4 py-3">Asset</th>
                                <th class="py-3">Owner</th>
                                <th class="py-3">Deal Type</th>
                                <th class="py-3">Status</th>
                                <th class="px-4 py-3 text-end">Action</th>
                            </tr>
                        </thead>
                        <tbody id="requests-table-body">
                            <!-- Dynamically populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>
    <!-- Theme Toggle -->
    <script src="js/theme.js"></script>
    <!-- Shared Data -->
    <script src="js/data.js"></script>
    <!-- Auth Logic -->
    <script src="js/auth.js"></script>
    <!-- Buyer JS -->
    <script src="js/buyer.js"></script>
</body>
</html>
