<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard — BastuBazar</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .dashboard-header {
            background: var(--primary);
            color: var(--white);
            padding: 3rem 0;
            margin-bottom: 3rem;
            position: relative;
            overflow: hidden;
        }
        .dashboard-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        .dashboard-title {
            font-size: 2rem;
            font-weight: 800;
            position: relative;
            z-index: 2;
        }
        .dashboard-subtitle {
            color: var(--primary-light);
            font-size: 1.1rem;
            position: relative;
            z-index: 2;
        }
        .upload-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
        }
        .img-upload-box {
            border: 2px dashed var(--gray-300);
            border-radius: var(--radius-md);
            padding: 2rem;
            text-align: center;
            background: var(--gray-50);
            cursor: pointer;
            transition: var(--transition);
        }
        .img-upload-box:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }
        .img-upload-box i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        #img-preview {
            max-width: 100%;
            border-radius: var(--radius-md);
            display: none;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <!-- ========== NAVBAR ========== -->
    <nav class="navbar navbar-expand-lg sticky-top bg-white border-bottom" id="main-navbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="brand-icon"><i class="bi bi-arrow-left-right"></i></span>
                BastuBazar
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-light btn-sm rounded-circle shadow-sm me-2" id="theme-toggle" style="width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; border: 1px solid #e5e7eb;">
                        <i class="bi bi-moon-fill"></i>
                    </button>
                    <button class="btn btn-outline-primary btn-sm rounded-pill px-3" id="btn-login" style="display:none;"></button>
                </div>
            </div>
        </div>
    </nav>

    <!-- ========== HEADER ========== -->
    <div class="dashboard-header">
        <div class="container">
            <h1 class="dashboard-title">Welcome back, <span id="seller-name">Seller</span>!</h1>
            <p class="dashboard-subtitle">Manage your listings and add new assets to monetize.</p>
        </div>
    </div>

    <!-- ========== DASHBOARD CONTENT ========== -->
    <div class="container mb-5 pb-5">
        <div class="row g-5">
            <!-- Left: Active Listings -->
            <div class="col-lg-7">
                <!-- Seller Profile Card -->
                <div class="card border-0 shadow-sm rounded-4 mb-5">
                    <div class="card-body p-4 d-flex align-items-center gap-4">
                        <div class="bg-primary-subtle text-primary rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width: 80px; height: 80px; font-size: 2rem; font-weight: bold;">
                            <span id="seller-initials">S</span>
                        </div>
                        <div>
                            <h4 class="fw-bold mb-1" id="profile-name">Seller Name</h4>
                            <p class="text-muted mb-2"><i class="bi bi-geo-alt-fill text-danger me-1"></i> <span id="profile-location">Kathmandu, Nepal</span></p>
                            <div class="d-flex gap-3 text-muted" style="font-size: 0.9rem;">
                                <span><i class="bi bi-star-fill text-warning me-1"></i> <span id="profile-rating">4.8</span> Rating</span>
                                <span><i class="bi bi-telephone-fill text-primary me-1"></i> <span id="profile-phone">+977 9800000000</span></span>
                                <span><i class="bi bi-calendar-check-fill text-success me-1"></i> Joined <span id="profile-joined">Mar 2025</span></span>
                            </div>
                        </div>
                    </div>
                </div>

                <h3 class="fw-bold mb-4"><i class="bi bi-collection-fill text-primary me-2"></i> Your Listings</h3>
                <div class="row g-4" id="seller-listings-grid">
                    <!-- Rendered by JS -->
                </div>
            </div>

            <!-- Right: List New Asset Form -->
            <div class="col-lg-5">
                <h3 class="fw-bold mb-4"><i class="bi bi-plus-circle-fill text-success me-2"></i> List New Asset</h3>
                <div class="upload-card">
                    <form id="add-asset-form">
                        
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Asset Photo</label>
                            <input type="file" id="asset-img-input" accept="image/*" class="d-none">
                            <div class="img-upload-box" id="img-upload-box">
                                <i class="bi bi-cloud-arrow-up"></i>
                                <p class="mb-0 fw-medium">Click to upload image</p>
                                <p class="text-muted small">PNG, JPG up to 5MB</p>
                            </div>
                            <img id="img-preview" src="" alt="Preview">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Title</label>
                            <input type="text" class="form-control" id="asset-title" placeholder="e.g. 5 KVA Generator" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea class="form-control" id="asset-description" rows="3" placeholder="Describe the item, its features, and any accessories included..." required></textarea>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label fw-semibold">Category</label>
                                <select class="form-select" id="asset-category" required>
                                    <option value="" disabled selected>Select...</option>
                                    <option value="Agriculture">Agriculture</option>
                                    <option value="Real Estate">Real Estate</option>
                                    <option value="Household">Household</option>
                                    <option value="Construction">Construction</option>
                                    <option value="Vehicles">Vehicles</option>
                                    <option value="Electronics">Electronics</option>
                                    <option value="Industrial">Industrial</option>
                                    <option value="Event Goods">Event Goods</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Location</label>
                                <select class="form-select" id="asset-location" required>
                                    <option value="" disabled selected>Select location...</option>
                                    <optgroup label="Bagmati Province">
                                        <option value="Kathmandu, Nepal">Kathmandu</option>
                                        <option value="Lalitpur, Nepal">Lalitpur (Patan)</option>
                                        <option value="Bhaktapur, Nepal">Bhaktapur</option>
                                        <option value="Hetauda, Nepal">Hetauda</option>
                                    </optgroup>
                                    <optgroup label="Gandaki Province">
                                        <option value="Pokhara, Nepal">Pokhara</option>
                                        <option value="Gorkha, Nepal">Gorkha</option>
                                        <option value="Damauli, Nepal">Damauli</option>
                                    </optgroup>
                                    <optgroup label="Lumbini Province">
                                        <option value="Butwal, Nepal">Butwal</option>
                                        <option value="Bharatpur, Nepal">Bharatpur</option>
                                        <option value="Nepalgunj, Nepal">Nepalgunj</option>
                                    </optgroup>
                                    <optgroup label="Province 1">
                                        <option value="Biratnagar, Nepal">Biratnagar</option>
                                        <option value="Dharan, Nepal">Dharan</option>
                                        <option value="Itahari, Nepal">Itahari</option>
                                    </optgroup>
                                    <optgroup label="Madhesh Province">
                                        <option value="Janakpur, Nepal">Janakpur</option>
                                        <option value="Birgunj, Nepal">Birgunj</option>
                                    </optgroup>
                                    <optgroup label="Karnali Province">
                                        <option value="Surkhet, Nepal">Surkhet</option>
                                        <option value="Jumla, Nepal">Jumla</option>
                                    </optgroup>
                                    <optgroup label="Sudurpashchim Province">
                                        <option value="Dhangadhi, Nepal">Dhangadhi</option>
                                        <option value="Mahendranagar, Nepal">Mahendranagar</option>
                                    </optgroup>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-12">
                                <label class="form-label fw-semibold">Condition</label>
                                <select class="form-select" id="asset-condition" required>
                                    <option value="" disabled selected>Select condition...</option>
                                    <option value="Excellent">Excellent</option>
                                    <option value="Like New">Like New</option>
                                    <option value="Good">Good</option>
                                    <option value="Fair">Fair</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Deal Types Available</label>
                            <div class="d-flex gap-3 flex-wrap">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="rent" id="tag-rent">
                                    <label class="form-check-label" for="tag-rent">Rent</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="sell" id="tag-sell">
                                    <label class="form-check-label" for="tag-sell">Sell</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="barter" id="tag-barter">
                                    <label class="form-check-label" for="tag-barter">Barter</label>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-6">
                                <label class="form-label fw-semibold">Price (NPR)</label>
                                <input type="number" class="form-control" id="asset-price" placeholder="5000" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Period</label>
                                <select class="form-select" id="asset-period">
                                    <option value="day">per day</option>
                                    <option value="month">per month</option>
                                    <option value="event">per event</option>
                                    <option value="one-time">one-time</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill">
                            <i class="bi bi-send-fill me-2"></i> Post Listing
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>
    <!-- Theme Toggle -->
    <script src="js/theme.js"></script>
    <!-- Shared Data -->
    <script src="js/data.js"></script>
    <!-- Auth Logic -->
    <script src="js/auth.js"></script>
    <!-- Seller JS -->
    <script src="js/seller.js"></script>
</body>
</html>
